<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registrarse — InvertIA</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #0D0D1A 0%, #1A1A2E 100%);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 2rem;
  }
  .card {
    background: white; border-radius: 20px; padding: 2.5rem;
    width: 100%; max-width: 420px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .logo { font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 700; color: #0D0D1A; margin-bottom: 0.25rem; }
  .logo span { color: #6C47FF; }
  .subtitle { font-size: 14px; color: #6B7280; margin-bottom: 2rem; }
  h2 { font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 700; color: #0D0D1A; margin-bottom: 0.25rem; }
  label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 6px; margin-top: 1rem; }
  input {
    width: 100%; padding: 11px 14px; border: 1.5px solid #E5E7EB;
    border-radius: 10px; font-size: 15px; color: #1F2937;
    transition: border-color 0.2s; outline: none; font-family: 'Inter', sans-serif;
  }
  input:focus { border-color: #6C47FF; box-shadow: 0 0 0 3px rgba(108,71,255,0.1); }
  .btn {
    width: 100%; padding: 13px; background: #6C47FF; color: white;
    border: none; border-radius: 10px; font-size: 15px; font-weight: 600;
    cursor: pointer; margin-top: 1.5rem; transition: all 0.2s;
    font-family: 'Inter', sans-serif;
  }
  .btn:hover { background: #4F2FE0; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(108,71,255,0.3); }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .error { background: #FEF2F2; border: 1px solid #FECACA; color: #DC2626; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-top: 1rem; display: none; }
  .footer-link { text-align: center; margin-top: 1.25rem; font-size: 14px; color: #6B7280; }
  .footer-link a { color: #6C47FF; text-decoration: none; font-weight: 500; }
  .back { display: inline-flex; align-items: center; gap: 4px; font-size: 13px; color: #6B7280; text-decoration: none; margin-bottom: 1.5rem; }
  .back:hover { color: #6C47FF; }
</style>
</head>
<body>
<div class="card">
  <a href="/" class="back">← Volver al inicio</a>
  <div class="logo">Invert<span>IA</span></div>
  <div class="subtitle">Tu asesor financiero con IA</div>
  <h2>Crear cuenta</h2>
  <p style="font-size:14px;color:#6B7280;margin-top:4px;">Empezá gratis, sin tarjeta de crédito.</p>

  <form id="form">
    <label>Tu nombre</label>
    <input type="text" id="name" placeholder="Ej: Martina" required autocomplete="name" />

    <label>Email</label>
    <input type="email" id="email" placeholder="tu@email.com" required autocomplete="email" />

    <label>Teléfono</label>
    <input type="tel" id="phone" placeholder="Ej: 11 2345 6789" required autocomplete="tel" />

    <label>Contraseña</label>
    <input type="password" id="password" placeholder="Mínimo 6 caracteres" required autocomplete="new-password" />

    <div class="error" id="error"></div>
    <button type="submit" class="btn" id="btn">Crear cuenta gratis →</button>
  </form>

  <div id="verify-step" style="display:none;">
    <p style="font-size:14px;color:#374151;line-height:1.5;">Te mandamos un código de 6 dígitos a <strong id="verify-email"></strong>. Escribilo acá abajo para confirmar tu cuenta.</p>
    <label>Código de verificación</label>
    <input type="text" id="code" placeholder="123456" maxlength="6" inputmode="numeric" autocomplete="one-time-code" style="letter-spacing:4px;font-size:18px;text-align:center;" />
    <div class="error" id="verify-error"></div>
    <button class="btn" id="verify-btn" onclick="verifyCode()">Confirmar código</button>
    <div style="text-align:center;margin-top:1rem;font-size:13px;color:#6B7280;">
      ¿No te llegó? <a href="#" id="resend-link" style="color:#6C47FF;text-decoration:none;font-weight:500;">Reenviar código</a>
    </div>
  </div>

  <div class="footer-link" id="login-footer">¿Ya tenés cuenta? <a href="/login" id="login-link">Iniciá sesión</a></div>
</div>

<script>
let verifyingEmail = '';
let pendingRedirect = '/app';

function verifyCode(){ submitCode(); }

async function submitCode(){
  const btn = document.getElementById('verify-btn');
  const error = document.getElementById('verify-error');
  const code = document.getElementById('code').value.trim();
  error.style.display = 'none';
  if(!code){ error.textContent='Ingresá el código.'; error.style.display='block'; return; }
  btn.disabled = true; btn.textContent = 'Verificando...';
  try{
    const res = await fetch('/api/verify-code', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({email:verifyingEmail, code})});
    const data = await res.json();
    if(data.ok){
      window.location.href = pendingRedirect;
    } else {
      error.textContent = data.error || 'No se pudo verificar.';
      error.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Confirmar código';
    }
  }catch(e){
    error.textContent = 'Error de conexión.';
    error.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Confirmar código';
  }
}

document.getElementById('resend-link').addEventListener('click', async (e) => {
  e.preventDefault();
  const error = document.getElementById('verify-error');
  error.style.display='none';
  try{
    const res = await fetch('/api/resend-code', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({email:verifyingEmail})});
    const data = await res.json();
    if(data.ok){
      error.style.color = '#059669'; error.style.background='#ECFDF5'; error.style.borderColor='#A7F3D0';
      error.textContent = 'Te mandamos un código nuevo.'; error.style.display='block';
    } else {
      error.style.color = '#DC2626'; error.style.background='#FEF2F2'; error.style.borderColor='#FECACA';
      error.textContent = data.error || 'No se pudo reenviar.'; error.style.display='block';
    }
  }catch(e){
    error.textContent = 'Error de conexión.'; error.style.display='block';
  }
});
</script>

<script>
(function(){
  const params = new URLSearchParams(window.location.search);
  const plan = params.get('plan');
  const ciclo = params.get('ciclo');
  if (plan === 'paid' || plan === 'advanced') {
    document.getElementById('login-link').href = `/login?plan=${plan}${ciclo==='yearly'?'&ciclo=yearly':''}`;
  }
})();
</script>
<script>
document.getElementById('form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('btn');
  const error = document.getElementById('error');
  error.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Creando cuenta...';

  const res = await fetch('/register', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      name: document.getElementById('name').value,
      email: document.getElementById('email').value,
      phone: document.getElementById('phone').value,
      password: document.getElementById('password').value
    })
  });
  const data = await res.json();
  if (data.ok && data.needsVerification) {
    const params = new URLSearchParams(window.location.search);
    const plan = params.get('plan');
    const ciclo = params.get('ciclo');
    pendingRedirect = (plan === 'paid' || plan === 'advanced') ? `/app?plan=${plan}${ciclo === 'yearly' ? '&ciclo=yearly' : ''}` : '/app';
    verifyingEmail = data.email;
    document.getElementById('verify-email').textContent = data.email;
    document.getElementById('form').style.display = 'none';
    document.getElementById('login-footer').style.display = 'none';
    document.getElementById('verify-step').style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Crear cuenta gratis →';
  } else if (data.ok) {
    const params = new URLSearchParams(window.location.search);
    const plan = params.get('plan');
    const ciclo = params.get('ciclo');
    if (plan === 'paid' || plan === 'advanced') {
      window.location.href = `/app?plan=${plan}${ciclo === 'yearly' ? '&ciclo=yearly' : ''}`;
    } else {
      window.location.href = '/app';
    }
  } else {
    error.textContent = data.error;
    error.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Crear cuenta gratis →';
  }
});
</script>
</body>
</html>
